name: i18n Auto Translate (Gemini)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
      LOCALES_DIR: locales/latest
      GLOSSARY_PATH: glossary/glossary.json
      PROMPT_PATH: prompts/translate.txt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Translate (Gemini Flash)
        run: python scripts/sync_translations.py

      - name: QA check
        run: |
          python scripts/qa_check.py \
            --locales locales/latest \
            --glossary glossary/glossary.json \
            --output locales/latest/.qa-report.json || true

      - name: Commit
        run: |
          git config user.name "i18n-bot"
          git config user.email "i18n-bot@vcms.dev"
          git add locales/latest/
          git diff --cached --quiet || git commit -m "i18n: auto translate $(date +%Y-%m-%d)"
          git push

      - name: Slack report
        env:
          REPORT_PATH: locales/latest/.sync-report.json
          QA_REPORT_PATH: locales/latest/.qa-report.json
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python scripts/notify_slack.py
