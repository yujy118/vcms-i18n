name: i18n Deploy (Approved)

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Source sync run ID'
        required: false
      approved_by:
        description: 'Approved by (slack/manual)'
        required: false
        default: 'manual'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: i18n/staging
          fetch-depth: 0

      - name: Merge staging to main
        run: |
          git config user.name "i18n-bot"
          git config user.email "i18n-bot@vcms.dev"
          git fetch origin main
          git checkout main
          git merge i18n/staging --no-edit -m "i18n: deploy approved translations (${{ inputs.approved_by }})"
          git push origin main

      - name: Notify deployment
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then exit 0; fi
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"channel":"'"$SLACK_CHANNEL"'","text":"🚀 번역 배포 완료! (승인: ${{ inputs.approved_by }})"}'

      - name: Cleanup staging
        run: git push origin --delete i18n/staging || true
