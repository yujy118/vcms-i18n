name: i18n New Key Alert

on:
  push:
    branches: [main]
    paths:
      - 'locales/latest/ko.json'

permissions:
  contents: read

jobs:
  alert:
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new keys
        id: detect
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess

          # Get previous ko.json
          try:
              prev = subprocess.run(
                  ["git", "show", "HEAD~1:locales/latest/ko.json"],
                  capture_output=True, text=True, check=True
              )
              old_keys = set(json.loads(prev.stdout).keys())
          except:
              old_keys = set()

          new_keys = set(json.load(open("locales/latest/ko.json", encoding="utf-8")).keys())
          added = sorted(new_keys - old_keys)
          removed = sorted(old_keys - new_keys)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"added={len(added)}\n")
              f.write(f"removed={len(removed)}\n")

          if added:
              print(f"New keys: {len(added)}")
              # Save for Slack
              ko = json.load(open("locales/latest/ko.json", encoding="utf-8"))
              details = [{"key": k, "ko": ko.get(k, "")[:80]} for k in added[:30]]
              with open("/tmp/new-keys.json", "w") as f:
                  json.dump({"added": len(added), "removed": len(removed), "keys": details}, f, ensure_ascii=False)
          else:
              print("No new keys (maybe key removal or value change only)")
          PYEOF

      - name: Slack alert
        if: steps.detect.outputs.added != '0'
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request

          TOKEN = os.environ.get("SLACK_BOT_TOKEN", "")
          CHANNEL = os.environ.get("SLACK_CHANNEL", "")
          if not TOKEN or not CHANNEL:
              print("No Slack credentials"); exit(0)

          data = json.load(open("/tmp/new-keys.json"))
          added = data["added"]
          removed = data["removed"]
          keys = data["keys"]

          lines = [f"*🆕 새 번역 키 {added}개 등록됨*"]
          if removed:
              lines[0] += f" (삭제 {removed}개)"
          lines.append("")
          for k in keys:
              lines.append(f"  • `{k['key']}`: {k['ko']}")
          if added > 30:
              lines.append(f"  ... 외 {added - 30}개")
          lines.append("")
          lines.append("> Claude Code에서 `미번역 번역해` 로 처리하세요")

          body = json.dumps({"channel": CHANNEL, "text": "\n".join(lines)}).encode()
          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=body,
              headers={"Authorization": f"Bearer {TOKEN}", "Content-Type": "application/json"},
          )
          try:
              resp = urllib.request.urlopen(req, timeout=15)
              r = json.loads(resp.read())
              print(f"Slack: {'OK' if r.get('ok') else r.get('error')}")
          except Exception as e:
              print(f"Slack failed: {e}")
          PYEOF
