name: i18n Merge New Translations

on:
  push:
    paths:
      - 'locales/new/*.json'
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge new into latest
        run: |
          python3 << 'PYEOF'
          import json, os, glob
          new_files = glob.glob('locales/new/*.json')
          if not new_files:
              print('No new files'); exit(0)
          for nf in new_files:
              fname = os.path.basename(nf)
              lf = 'locales/latest/' + fname
              new = json.load(open(nf, encoding='utf-8'))
              print(fname + ': ' + str(len(new)) + ' new keys')
              if os.path.exists(lf):
                  old = json.load(open(lf, encoding='utf-8'))
                  print('  existing: ' + str(len(old)) + ' keys')
                  old.update(new)
                  merged = old
              else:
                  merged = new
              s = dict(sorted(merged.items()))
              json.dump(s, open(lf, 'w', encoding='utf-8'), ensure_ascii=False, indent=2)
              print('  merged: ' + str(len(s)) + ' keys')
              os.remove(nf)
              print('  cleaned: ' + nf)
          print('Done!')
          PYEOF

      - name: Commit
        run: |
          git config user.name "i18n-bot"
          git config user.email "i18n-bot@vcms.dev"
          git add locales/
          git diff --cached --quiet || git commit -m "i18n: merge new translations"
          git push
