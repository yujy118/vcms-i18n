name: i18n Merge New Translations

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge _new.json into base files
        run: |
          python3 << 'PYEOF'
          import json, os, glob

          new_files = glob.glob('locales/latest/*_new.json')
          if not new_files:
              print('No _new.json files found')
              exit(0)

          for nf in new_files:
              fname = os.path.basename(nf)
              lang = fname.replace('_new.json', '')
              base = f'locales/latest/{lang}.json'

              new = json.load(open(nf, encoding='utf-8'))
              print(f'{fname}: {len(new)} new keys')

              if os.path.exists(base):
                  old = json.load(open(base, encoding='utf-8'))
                  print(f'  {lang}.json existing: {len(old)} keys')
                  old.update(new)
                  merged = old
              else:
                  merged = new

              s = dict(sorted(merged.items()))
              json.dump(s, open(base, 'w', encoding='utf-8'), ensure_ascii=False, indent=2)
              print(f'  merged: {len(s)} keys -> {base}')

              os.remove(nf)
              print(f'  cleaned: {nf}')

          print('Done!')
          PYEOF

      - name: Commit
        run: |
          git config user.name "i18n-bot"
          git config user.email "i18n-bot@vcms.dev"
          git add locales/
          git diff --cached --quiet || git commit -m "i18n: merge new translations"
          git push
