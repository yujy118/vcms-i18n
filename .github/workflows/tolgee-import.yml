name: Tolgee Import (Push translations)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "테스트만 (실제 반영 안 함)"
        type: boolean
        default: true
      force_overwrite:
        description: "기존 번역도 덮어쓰기 (GitHub 기준)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  import:
    runs-on: ubuntu-latest
    env:
      TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY }}
      TOLGEE_URL: https://tolgee.internal.vendit.tech
      TOLGEE_PROJECT_ID: 4
      TOLGEE_NAMESPACE: vcms
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      FORCE_OVERWRITE: ${{ github.event.inputs.force_overwrite }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Import translations to Tolgee
        run: |
          python3 << 'PYEOF'
          import json, os, requests, time
          from collections import defaultdict

          URL = os.environ['TOLGEE_URL']
          PID = os.environ['TOLGEE_PROJECT_ID']
          API = os.environ['TOLGEE_API_KEY']
          NS  = os.environ['TOLGEE_NAMESPACE']
          DRY = os.environ.get('DRY_RUN', 'true') == 'true'
          FORCE = os.environ.get('FORCE_OVERWRITE', 'false') == 'true'
          hdrs = {'X-API-Key': API, 'Content-Type': 'application/json'}

          LOCALES = 'locales/latest'
          LANGS = {'en': 'en.json', 'ja': 'ja.json', 'zh': 'zh.json', 'es': 'es.json'}

          ko = json.load(open(f'{LOCALES}/ko.json', encoding='utf-8'))
          print(f'Total ko keys: {len(ko)}')
          print(f'Mode: {"FORCE OVERWRITE" if FORCE else "NEW ONLY"} | DRY: {DRY}')

          lang_data = {}
          for lang, fname in LANGS.items():
              path = f'{LOCALES}/{fname}'
              if os.path.exists(path):
                  lang_data[lang] = json.load(open(path, encoding='utf-8'))
              else:
                  lang_data[lang] = {}
              print(f'{lang}: {len(lang_data[lang])} keys loaded')

          print('Fetching Tolgee data...')
          tolgee_keys = {}
          page = 0
          while True:
              resp = requests.get(f'{URL}/v2/projects/{PID}/translations',
                  headers=hdrs,
                  params={'filterNamespace': NS, 'languages': 'en,ja,zh,es', 'size': 100, 'page': page},
                  timeout=30)
              data = resp.json()
              embedded = data.get('_embedded', {}).get('keys', [])
              if not embedded: break
              for item in embedded:
                  kn = item.get('keyName', '')
                  tr = item.get('translations', {})
                  tolgee_keys[kn] = {}
                  for lang in LANGS:
                      t = tr.get(lang, {})
                      tolgee_keys[kn][lang] = t.get('text', '') or ''
              total_pages = data.get('page', {}).get('totalPages', 1)
              page += 1
              if page >= total_pages: break
          print(f'Tolgee keys fetched: {len(tolgee_keys)}')

          updates = []
          new_count = 0
          changed_count = 0
          for key in ko:
              for lang in LANGS:
                  local_val = lang_data[lang].get(key, '')
                  tolgee_val = tolgee_keys.get(key, {}).get(lang, '')
                  if not local_val:
                      continue
                  if not tolgee_val:
                      updates.append({'key': key, 'lang': lang, 'text': local_val, 'type': 'NEW'})
                      new_count += 1
                  elif FORCE and local_val != tolgee_val:
                      updates.append({'key': key, 'lang': lang, 'text': local_val, 'type': 'CHANGED'})
                      changed_count += 1

          print(f'Updates: {len(updates)} (new: {new_count}, changed: {changed_count})')
          if len(updates) == 0:
              print('Nothing to import'); exit(0)

          for u in updates[:30]:
              print(f'  [{u["type"]}] {u["key"]} [{u["lang"]}]: {u["text"][:60]}')
          if len(updates) > 30:
              print(f'  ... and {len(updates) - 30} more')

          if DRY:
              print('DRY RUN - no changes made')
              exit(0)

          by_key = defaultdict(dict)
          for u in updates:
              by_key[u['key']][u['lang']] = u['text']

          success = 0
          failed = 0
          for i, (key, translations) in enumerate(by_key.items()):
              try:
                  r = requests.put(f'{URL}/v2/projects/{PID}/translations',
                      headers=hdrs,
                      json={'key': key, 'namespace': NS, 'translations': translations},
                      timeout=15)
                  if r.status_code == 200:
                      success += 1
                  else:
                      failed += 1
                      print(f'  FAIL [{r.status_code}]: {key} - {r.text[:100]}')
              except Exception as e:
                  failed += 1
                  print(f'  ERROR: {key} - {e}')

              if (i + 1) % 50 == 0:
                  print(f'  Progress: {i+1}/{len(by_key)}')
                  time.sleep(1)

          print(f'Done! Success: {success}, Failed: {failed}')
          PYEOF
