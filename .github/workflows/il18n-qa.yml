name: i18n QA Check (Auto)

on:
  push:
    paths:
      - 'locales/latest/*.json'
    branches: [main]
  workflow_dispatch:
    inputs:
      update_from_tolgee:
        description: 'Tolgee에서 최신 번역 가져온 후 QA 실행'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  qa:
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
      TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY }}
      TOLGEE_URL: https://tolgee.internal.vendit.tech
      TOLGEE_PROJECT_ID: 4
      TOLGEE_NAMESPACE: vcms

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Export from Tolgee
        if: ${{ github.event.inputs.update_from_tolgee == 'true' }}
        run: |
          python3 << 'PYEOF'
          import json, os, requests

          URL = os.environ['TOLGEE_URL']
          PID = os.environ['TOLGEE_PROJECT_ID']
          API = os.environ['TOLGEE_API_KEY']
          NS  = os.environ['TOLGEE_NAMESPACE']
          hdrs = {'X-API-Key': API, 'Content-Type': 'application/json'}
          LOCALES = 'locales/latest'
          LANG_MAP = {'ko': 'ko.json', 'en': 'en.json', 'ja': 'ja.json', 'zh': 'zh.json', 'es': 'es.json'}

          print('Exporting from Tolgee...')
          all_keys = {}
          page = 0
          while True:
              resp = requests.get(f'{URL}/v2/projects/{PID}/translations',
                  headers=hdrs,
                  params={'filterNamespace': NS, 'languages': ','.join(LANG_MAP.keys()), 'size': 250, 'page': page},
                  timeout=60)
              data = resp.json()
              embedded = data.get('_embedded', {}).get('keys', [])
              if not embedded: break
              for item in embedded:
                  kn = item.get('keyName', '')
                  tr = item.get('translations', {})
                  all_keys[kn] = {}
                  for lang in LANG_MAP:
                      t = tr.get(lang, {})
                      all_keys[kn][lang] = t.get('text', '') or ''
              total_pages = data.get('page', {}).get('totalPages', 1)
              page += 1
              print(f'  page {page}/{total_pages} ({len(all_keys)} keys)')
              if page >= total_pages: break
          print(f'Total keys from Tolgee: {len(all_keys)}')

          for lang, fname in LANG_MAP.items():
              lang_dict = {}
              for key in sorted(all_keys.keys()):
                  val = all_keys[key].get(lang, '')
                  if val:
                      lang_dict[key] = val
              path = f'{LOCALES}/{fname}'
              with open(path, 'w', encoding='utf-8') as f:
                  json.dump(lang_dict, f, ensure_ascii=False, indent=2)
                  f.write('\n')
              print(f'  {fname}: {len(lang_dict)} keys')
          print('Export complete')
          PYEOF

      - name: Commit Tolgee updates
        if: ${{ github.event.inputs.update_from_tolgee == 'true' }}
        run: |
          git config user.name "i18n-bot"
          git config user.email "i18n-bot@vcms.dev"
          git add locales/latest/
          git diff --cached --quiet && echo "No changes from Tolgee" && exit 0
          git commit -m "sync: update locales from Tolgee export"
          git push

      - name: QA check and Slack notify
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          UPDATE_FROM_TOLGEE: ${{ github.event.inputs.update_from_tolgee }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, requests, math, csv, io

          LOCALES = "locales/latest"
          GLOSSARY = "glossary/glossary.json"
          TOKEN = os.environ.get("SLACK_BOT_TOKEN", "")
          CHANNEL = os.environ.get("SLACK_CHANNEL", "")
          REPO = os.environ.get("GITHUB_REPOSITORY", "yujy118/vcms-i18n")

          if not TOKEN or not CHANNEL:
              print("SLACK env missing"); exit(0)

          headers = {"Authorization": f"Bearer {TOKEN}", "Content-Type": "application/json"}
          headers_upload = {"Authorization": f"Bearer {TOKEN}"}
          API = "https://slack.com/api/chat.postMessage"

          ko = json.load(open(f"{LOCALES}/ko.json", encoding="utf-8"))
          total_keys = len(ko)

          lang_map = {"en": "en.json", "ja": "ja.json", "zh-CN": None, "es": "es.json"}
          if os.path.exists(f"{LOCALES}/zh-CN.json"):
              lang_map["zh-CN"] = "zh-CN.json"
          elif os.path.exists(f"{LOCALES}/zh.json"):
              lang_map["zh-CN"] = "zh.json"

          flags = {"en": "\U0001f1fa\U0001f1f8", "ja": "\U0001f1ef\U0001f1f5", "zh-CN": "\U0001f1e8\U0001f1f3", "es": "\U0001f1ea\U0001f1f8"}
          display = {"en": "EN", "ja": "JA", "zh-CN": "ZH", "es": "ES"}

          lang_data = {}
          for lang, fname in lang_map.items():
              if fname and os.path.exists(f"{LOCALES}/{fname}"):
                  lang_data[lang] = json.load(open(f"{LOCALES}/{fname}", encoding="utf-8"))
              else:
                  lang_data[lang] = {}

          missing = {}
          all_missing = set()
          for lang in lang_map:
              missing[lang] = [k for k in ko if k not in lang_data[lang]]
              all_missing.update(missing[lang])
          total_missing = len(all_missing)

          # ===== QA with detailed breakdown =====
          blocks_count = 0
          warns_count = 0
          qa_breakdown = {}
          try:
              subprocess.run(
                  ["python", "scripts/qa_check.py", "--locales", LOCALES,
                   "--glossary", GLOSSARY, "--output", "/tmp/qa-report.json"],
                  capture_output=True, text=True, timeout=120
              )
              if os.path.exists("/tmp/qa-report.json"):
                  qa = json.load(open("/tmp/qa-report.json"))
                  if isinstance(qa, list):
                      for item in qa:
                          sev = item.get("severity", "")
                          chk = item.get("check", "unknown")
                          if chk not in qa_breakdown:
                              qa_breakdown[chk] = {"BLOCK": 0, "WARNING": 0}
                          if sev in ("BLOCK", "WARNING"):
                              qa_breakdown[chk][sev] += 1
                      blocks_count = sum(v["BLOCK"] for v in qa_breakdown.values())
                      warns_count = sum(v["WARNING"] for v in qa_breakdown.values())
          except Exception as e:
              print(f"QA error: {e}")

          CHECK_LABELS = {
              "glossary_violation": "\U0001f4d6 용어집 위반",
              "brand_translated": "\U0001f3f7 브랜드 오번역",
              "brand_not_english": "\U0001f3f7 브랜드 한국어 누출",
              "es_capitalization": "\U0001f524 ES 대문자",
              "placeholder_missing": "\u26a0\ufe0f 변수 누락",
              "placeholder_extra": "\u2139\ufe0f 변수 추가",
              "newline_mismatch": "\u21a9\ufe0f 줄바꿈 불일치",
              "empty": "\u274c 빈 값",
              "ai_leak": "\U0001f916 AI 프롬프트 누출",
              "html_broken": "\U0001f517 HTML 태그 깨짐",
              "untranslated": "\U0001f50d 미번역 의심",
              "icu_broken": "\U0001f4ac ICU 포맷 깨짐",
              "icu_mismatch": "\U0001f4ac ICU 포맷 불일치",
              "length_ratio": "\U0001f4cf 번역 길이 초과",
          }

          qa_lines = []
          sorted_checks = sorted(qa_breakdown.items(), key=lambda x: (-x[1]["BLOCK"], -x[1]["WARNING"]))
          for chk, counts in sorted_checks:
              b = counts["BLOCK"]
              w = counts["WARNING"]
              if b == 0 and w == 0: continue
              label = CHECK_LABELS.get(chk, chk)
              parts = []
              if b > 0: parts.append(f"*{b}* BLOCK")
              if w > 0: parts.append(f"{w} WARN")
              qa_lines.append(f"{label}: {' / '.join(parts)}")

          qa_detail = "\n".join(qa_lines) if qa_lines else "\u2705 검출 없음"

          # ===== Cost estimate =====
          batch_size = 30
          total_batches = sum(math.ceil(len(missing[l]) / batch_size) for l in missing if len(missing[l]) > 0)
          cost_input = total_batches * 550 * 3 / 1_000_000
          cost_output = sum(len(missing[l]) for l in missing) * 50 * 15 / 1_000_000
          cost_total = cost_input + cost_output
          cost_krw = int(cost_total * 1400)
          est_minutes = max(1, total_batches // 3)

          lang_parts = []
          for lang in ["en", "ja", "zh-CN", "es"]:
              cnt = len(missing.get(lang, []))
              lang_parts.append(f"{flags[lang]} {display[lang]} {cnt}\uac74")
          lang_line = " | ".join(lang_parts)

          from_tolgee = os.environ.get("UPDATE_FROM_TOLGEE", "") == "true"
          source_tag = " (Tolgee \ucd5c\uc2e0)" if from_tolgee else ""

          if blocks_count == 0 and total_missing == 0:
              status = "\u2705"
          elif blocks_count > 0:
              status = "\U0001f6a8"
          else:
              status = "\U0001f504"

          # ===== MAIN MESSAGE =====
          main_blocks = [
              {"type": "header", "text": {"type": "plain_text", "text": f"{status} i18n QA \uacb0\uacfc{source_tag}", "emoji": True}},
              {"type": "section", "text": {"type": "mrkdwn", "text": (
                  f"*\ucd1d \ud0a4:* {total_keys}\uac1c | *\ubbf8\ubc88\uc5ed:* {total_missing}\uac74\n"
                  f"*QA:* \U0001f6ab BLOCK *{blocks_count}*\uac74 | \u26a0\ufe0f WARNING {warns_count}\uac74\n\n"
                  f"{lang_line}"
              )}},
              {"type": "divider"},
              {"type": "section", "text": {"type": "mrkdwn", "text": f"*QA \uc0c1\uc138*\n{qa_detail}"}},
          ]

          resp = requests.post(API, headers=headers, json={
              "channel": CHANNEL, "blocks": main_blocks,
              "text": f"{status} i18n QA: BLOCK {blocks_count} / WARN {warns_count} / \ubbf8\ubc88\uc5ed {total_missing}"
          })
          main_ts = resp.json().get("ts", "")
          print(f"Main posted: {main_ts}")

          if total_missing == 0 and blocks_count == 0:
              print("All clear"); exit(0)

          # ===== THREAD: BLOCK details =====
          if blocks_count > 0 and os.path.exists("/tmp/qa-report.json"):
              qa_all = json.load(open("/tmp/qa-report.json"))
              block_items = [i for i in qa_all if i.get("severity") == "BLOCK"]

              # Group by check type
              by_check = {}
              for item in block_items:
                  chk = item.get("check", "unknown")
                  if chk not in by_check: by_check[chk] = []
                  by_check[chk].append(item)

              block_text_parts = []
              for chk, items in sorted(by_check.items()):
                  label = CHECK_LABELS.get(chk, chk)
                  block_text_parts.append(f"\n*{label}* ({len(items)}\uac74)")
                  for item in items[:10]:
                      key = item.get("key", "")
                      lang = item.get("lang", "")
                      msg = item.get("message", "")
                      block_text_parts.append(f"\u2022 `{key}` [{lang}] {msg}")
                  if len(items) > 10:
                      block_text_parts.append(f"  _... +{len(items)-10}\uac74 \ub354_")

              block_text = "\n".join(block_text_parts)
              # Slack limit: 3000 chars per section
              if len(block_text) > 2900:
                  block_text = block_text[:2900] + "\n_... (truncated)_"

              requests.post(API, headers=headers, json={
                  "channel": CHANNEL, "thread_ts": main_ts,
                  "blocks": [
                      {"type": "section", "text": {"type": "mrkdwn", "text": f"\U0001f6ab *BLOCK \uc0c1\uc138 ({blocks_count}\uac74)*\n\uc7ac\ubc88\uc5ed \ud544\uc694:{block_text}"}},
                  ],
                  "text": f"BLOCK \uc0c1\uc138 {blocks_count}\uac74"
              })

          # ===== THREAD: Missing keys CSV + translate options =====
          if total_missing > 0:
              sorted_keys = sorted(list(all_missing))
              buf = io.StringIO()
              writer = csv.writer(buf)
              writer.writerow(["key", "ko", "en", "ja", "zh-CN", "es"])
              for k in sorted_keys:
                  writer.writerow([k, ko.get(k, ""), lang_data["en"].get(k, ""),
                      lang_data["ja"].get(k, ""), lang_data["zh-CN"].get(k, ""), lang_data["es"].get(k, "")])
              csv_content = buf.getvalue().encode("utf-8-sig")

              try:
                  resp1 = requests.post("https://slack.com/api/files.getUploadURLExternal",
                      headers=headers_upload, data={"filename": "missing_keys.csv", "length": len(csv_content)})
                  r1 = resp1.json()
                  if r1.get("ok"):
                      requests.post(r1["upload_url"], files={"file": ("missing_keys.csv", csv_content, "text/csv")})
                      requests.post("https://slack.com/api/files.completeUploadExternal", headers=headers,
                          json={"files": [{"id": r1["file_id"]}], "channel_id": CHANNEL, "thread_ts": main_ts,
                                "initial_comment": f"\U0001f4ce *\ubbf8\ubc88\uc5ed \ud0a4 \ubaa9\ub85d* ({total_missing}\uac74)"})
                      print("CSV uploaded")
              except Exception as e:
                  print(f"CSV upload error: {e}")

              cost_blocks = [
                  {"type": "section", "text": {"type": "mrkdwn", "text": (
                      f"\U0001f4b0 *\uc790\ub3d9 \ubc88\uc5ed \uc608\uc0c1*\n"
                      f"\u2022 API \ud638\ucd9c: {total_batches}\ud68c | \uc608\uc0c1: *${cost_total:.2f}* (\uc57d {cost_krw}\uc6d0) | \uc18c\uc694: ~{est_minutes}\ubd84"
                  )}},
                  {"type": "actions", "elements": [{
                      "type": "button",
                      "text": {"type": "plain_text", "text": "\U0001f504 \uc790\ub3d9 \ubc88\uc5ed \uc2e4\ud589", "emoji": True},
                      "style": "primary", "action_id": "i18n_translate",
                      "value": json.dumps({"repo": REPO, "missing": total_missing, "cost": f"${cost_total:.2f}"}),
                      "confirm": {
                          "title": {"type": "plain_text", "text": "\uc790\ub3d9 \ubc88\uc5ed \uc2e4\ud589"},
                          "text": {"type": "mrkdwn", "text": f"\ubbf8\ubc88\uc5ed {total_missing}\ud0a4\ub97c Sonnet\uc73c\ub85c \ubc88\uc5ed\ud569\ub2c8\ub2e4.\n\uc608\uc0c1 \ube44\uc6a9: *${cost_total:.2f}*\n\n\uc2e4\ud589\ud558\uc2dc\uaca0\uc2b5\ub2c8\uae4c?"},
                          "confirm": {"type": "plain_text", "text": "\uc2e4\ud589"},
                          "deny": {"type": "plain_text", "text": "\ucde8\uc18c"}
                      }
                  }]},
                  {"type": "section", "text": {"type": "mrkdwn", "text": (
                      "\U0001f4dd *\uc218\ub3d9 \ubc88\uc5ed*: CSV \ub2e4\uc6b4 \u2192 "
                      f"<https://claude.ai|Claude.ai> vcms-i18n \ud504\ub85c\uc81d\ud2b8\uc5d0\uc11c \ubc88\uc5ed \u2192 GitHub push \u2192 QA \uc7ac\uc2e4\ud589"
                  )}},
              ]

              requests.post(API, headers=headers, json={
                  "channel": CHANNEL, "thread_ts": main_ts,
                  "blocks": cost_blocks, "text": "\ubc88\uc5ed \uc635\uc158"
              })

          print(f"Done: BLOCK {blocks_count} / WARN {warns_count} / missing {total_missing}")
          PYEOF
