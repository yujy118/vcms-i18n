name: i18n QA Check (Auto)

on:
  push:
    paths:
      - 'locales/latest/*.json'
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: QA check and Slack notify
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, requests, math, csv, io

          LOCALES = "locales/latest"
          GLOSSARY = "glossary/glossary.json"
          TOKEN = os.environ.get("SLACK_BOT_TOKEN", "")
          CHANNEL = os.environ.get("SLACK_CHANNEL", "")
          REPO = os.environ.get("GITHUB_REPOSITORY", "yujy118/vcms-i18n")

          if not TOKEN or not CHANNEL:
              print("SLACK env missing"); exit(0)

          headers = {"Authorization": f"Bearer {TOKEN}", "Content-Type": "application/json"}
          headers_upload = {"Authorization": f"Bearer {TOKEN}"}
          API = "https://slack.com/api/chat.postMessage"

          # Load ko
          ko = json.load(open(f"{LOCALES}/ko.json", encoding="utf-8"))
          total_keys = len(ko)

          # Lang config
          lang_map = {"en": "en.json", "ja": "ja.json", "zh-CN": None, "es": "es.json"}
          if os.path.exists(f"{LOCALES}/zh-CN.json"):
              lang_map["zh-CN"] = "zh-CN.json"
          elif os.path.exists(f"{LOCALES}/zh.json"):
              lang_map["zh-CN"] = "zh.json"

          flags = {"en": "\U0001f1fa\U0001f1f8", "ja": "\U0001f1ef\U0001f1f5", "zh-CN": "\U0001f1e8\U0001f1f3", "es": "\U0001f1ea\U0001f1f8"}
          display = {"en": "EN", "ja": "JA", "zh-CN": "ZH", "es": "ES"}

          # Load all lang data
          lang_data = {}
          for lang, fname in lang_map.items():
              if fname and os.path.exists(f"{LOCALES}/{fname}"):
                  lang_data[lang] = json.load(open(f"{LOCALES}/{fname}", encoding="utf-8"))
              else:
                  lang_data[lang] = {}

          # Missing keys per lang
          missing = {}
          all_missing = set()
          for lang in lang_map:
              missing[lang] = [k for k in ko if k not in lang_data[lang]]
              all_missing.update(missing[lang])

          total_missing = len(all_missing)

          # QA check
          blocks_count = 0
          warns_count = 0
          try:
              subprocess.run(
                  ["python", "scripts/qa_check.py", "--locales", LOCALES,
                   "--glossary", GLOSSARY, "--output", "/tmp/qa-report.json"],
                  capture_output=True, text=True, timeout=60
              )
              if os.path.exists("/tmp/qa-report.json"):
                  qa = json.load(open("/tmp/qa-report.json"))
                  if isinstance(qa, list):
                      blocks_count = len([i for i in qa if i.get("severity") == "BLOCK"])
                      warns_count = len([i for i in qa if i.get("severity") == "WARNING"])
                  elif isinstance(qa, dict):
                      blocks_count = qa.get("block", 0)
                      warns_count = qa.get("warning", 0)
          except Exception as e:
              print(f"QA error: {e}")

          # Cost estimate
          batch_size = 30
          total_batches = sum(math.ceil(len(missing[l]) / batch_size) for l in missing if len(missing[l]) > 0)
          cost_input = total_batches * 550 * 3 / 1_000_000
          cost_output = sum(len(missing[l]) for l in missing) * 50 * 15 / 1_000_000
          cost_total = cost_input + cost_output
          cost_krw = int(cost_total * 1400)
          est_minutes = max(1, total_batches // 3)

          # Lang status
          lang_parts = []
          for lang in ["en", "ja", "zh-CN", "es"]:
              cnt = len(missing.get(lang, []))
              lang_parts.append(f"{flags[lang]} {display[lang]} {cnt}건")
          lang_line = " | ".join(lang_parts)

          status = "\u2705" if total_missing == 0 else "\U0001f504"

          # === MAIN MESSAGE ===
          main_blocks = [
              {"type": "header", "text": {"type": "plain_text", "text": f"{status} i18n QA 결과", "emoji": True}},
              {"type": "section", "text": {"type": "mrkdwn", "text": (
                  f"*총 키:* {total_keys}개\n"
                  f"*QA:* BLOCK {blocks_count}건 | WARNING {warns_count}건\n"
                  f"*미번역:* {total_missing}건\n\n"
                  f"{lang_line}"
              )}},
          ]

          resp = requests.post(API, headers=headers, json={
              "channel": CHANNEL,
              "blocks": main_blocks,
              "text": f"{status} i18n QA: 미번역 {total_missing}건"
          })
          main_ts = resp.json().get("ts", "")
          print(f"Main posted: {main_ts}")

          if total_missing == 0:
              print("No missing keys"); exit(0)

          # === BUILD CSV ===
          sorted_keys = sorted(list(all_missing))
          buf = io.StringIO()
          writer = csv.writer(buf)
          writer.writerow(["key", "ko", "en", "ja", "zh-CN", "es"])
          for k in sorted_keys:
              writer.writerow([
                  k,
                  ko.get(k, ""),
                  lang_data["en"].get(k, ""),
                  lang_data["ja"].get(k, ""),
                  lang_data["zh-CN"].get(k, ""),
                  lang_data["es"].get(k, ""),
              ])
          csv_content = buf.getvalue().encode("utf-8-sig")

          # Upload CSV to Slack
          csv_uploaded = False
          try:
              # Step 1: get upload URL
              resp1 = requests.post("https://slack.com/api/files.getUploadURLExternal",
                  headers=headers_upload,
                  data={"filename": "missing_keys.csv", "length": len(csv_content)}
              )
              r1 = resp1.json()
              if r1.get("ok"):
                  upload_url = r1["upload_url"]
                  file_id = r1["file_id"]
                  # Step 2: upload file
                  requests.post(upload_url,
                      files={"file": ("missing_keys.csv", csv_content, "text/csv")}
                  )
                  # Step 3: complete upload and share to thread
                  requests.post("https://slack.com/api/files.completeUploadExternal",
                      headers=headers,
                      json={"files": [{"id": file_id}], "channel_id": CHANNEL, "thread_ts": main_ts,
                            "initial_comment": f"\U0001f4ce *미번역 키 목록* ({total_missing}건)\n전체 키와 원문이 포함된 CSV 파일입니다."}
                  )
                  csv_uploaded = True
                  print("CSV uploaded")
              else:
                  print(f"Upload URL failed: {r1}")
          except Exception as e:
              print(f"CSV upload error: {e}")

          # === THREAD: Cost + buttons ===
          cost_blocks = [
              {"type": "section", "text": {"type": "mrkdwn", "text": (
                  f"\U0001f4b0 *자동 번역 예상*\n"
                  f"• API 호출: {total_batches}회\n"
                  f"• 예상 비용: *${cost_total:.2f}* (약 {cost_krw}원)\n"
                  f"• 예상 소요: 약 {est_minutes}분\n"
                  f"• 모델: Claude Sonnet 4.5"
              )}},
              {"type": "divider"},
              {"type": "actions", "elements": [
                  {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "\U0001f504 자동 번역 실행", "emoji": True},
                      "style": "primary",
                      "action_id": "i18n_translate",
                      "value": json.dumps({"repo": REPO, "missing": total_missing, "cost": f"${cost_total:.2f}"}),
                      "confirm": {
                          "title": {"type": "plain_text", "text": "자동 번역 실행"},
                          "text": {"type": "mrkdwn", "text": f"미번역 {total_missing}키를 Sonnet으로 번역합니다.\n예상 비용: *${cost_total:.2f}* (약 {cost_krw}원)\n\n실행하시겠습니까?"},
                          "confirm": {"type": "plain_text", "text": "실행"},
                          "deny": {"type": "plain_text", "text": "취소"}
                      }
                  },
              ]},
              {"type": "divider"},
              {"type": "section", "text": {"type": "mrkdwn", "text": (
                  "\U0001f4dd *수동 번역 방법 (비용 $0)*\n\n"
                  "*1. CSV 다운로드*\n"
                  "   위 첨부된 `missing_keys.csv`를 다운로드합니다.\n\n"
                  "*2. Claude 프로젝트에서 번역 요청*\n"
                  f"   <https://claude.ai|Claude.ai> \u2192 프로젝트 *vcms-i18n* 에서 CSV를 업로드하고:\n"
                  "   _\"이 CSV의 미번역 키를 5개국어(en, ja, zh-CN, es) 번역해줘._\n"
                  "   _glossary.json 용어집을 따르고, 숙박업 채널매니저 맥락으로 번역해줘.\"_\n\n"
                  "*3. 번역 결과 적용*\n"
                  "   Claude가 번역한 JSON을 각 파일에 추가합니다:\n"
                  f"   \u2022 <https://github.com/{REPO}/edit/main/locales/latest/en.json|en.json 편집>\n"
                  f"   \u2022 <https://github.com/{REPO}/edit/main/locales/latest/ja.json|ja.json 편집>\n"
                  f"   \u2022 <https://github.com/{REPO}/edit/main/locales/latest/zh-CN.json|zh-CN.json 편집>\n"
                  f"   \u2022 <https://github.com/{REPO}/edit/main/locales/latest/es.json|es.json 편집>\n\n"
                  "*4. Push \u2192 QA 자동 재실행*\n"
                  "   커밋하면 QA가 다시 돌아갑니다. 미번역 0건이면 \u2705 완료!"
              )}},
          ]

          requests.post(API, headers=headers, json={
              "channel": CHANNEL, "thread_ts": main_ts,
              "blocks": cost_blocks,
              "text": "번역 옵션"
          })

          print(f"Done: {total_missing} missing, est ${cost_total:.2f}")
          PYEOF
