name: Tolgee Sync (Daily)

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 09:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY }}
      TOLGEE_URL: https://tolgee.internal.vendit.tech
      TOLGEE_PROJECT_ID: 4
      TOLGEE_NAMESPACE: vcms

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Sync from Tolgee
        run: |
          python3 << 'PYEOF'
          import json, os, requests, datetime, shutil

          TOLGEE_URL = os.environ["TOLGEE_URL"]
          PROJECT_ID = os.environ["TOLGEE_PROJECT_ID"]
          API_KEY = os.environ["TOLGEE_API_KEY"]
          NAMESPACE = os.environ["TOLGEE_NAMESPACE"]

          LOCALES = "locales/latest"
          LANGS = ["ko", "en", "ja", "zh", "es"]
          LANG_FILES = {"ko": "ko.json", "en": "en.json", "ja": "ja.json", "zh": "zh.json", "es": "es.json"}
          headers = {"X-API-Key": API_KEY}
          today = datetime.date.today().isoformat()

          # Tolgee에서 전체 키 가져오기 (namespace: vcms)
          print(f"Fetching keys from Tolgee (namespace: {NAMESPACE})...")
          all_keys = {}
          page = 0
          while True:
              resp = requests.get(
                  f"{TOLGEE_URL}/v2/projects/{PROJECT_ID}/translations",
                  headers=headers,
                  params={
                      "filterNamespace": NAMESPACE,
                      "languages": ",".join(LANGS),
                      "size": 100,
                      "page": page,
                  },
                  timeout=30
              )
              data = resp.json()
              embedded = data.get("_embedded", {}).get("keys", [])
              if not embedded:
                  break
              for item in embedded:
                  key_name = item.get("keyName", "")
                  translations = item.get("translations", {})
                  all_keys[key_name] = {}
                  for lang in LANGS:
                      t = translations.get(lang, {})
                      all_keys[key_name][lang] = t.get("text", "") or ""
              total_pages = data.get("page", {}).get("totalPages", 1)
              page += 1
              if page >= total_pages:
                  break

          print(f"Fetched {len(all_keys)} keys from Tolgee")
          if len(all_keys) == 0:
              print("No keys found, exiting"); exit(0)

          # 기존 ko.json 키와 비교
          existing_ko = {}
          ko_path = f"{LOCALES}/ko.json"
          if os.path.exists(ko_path):
              existing_ko = json.load(open(ko_path, encoding="utf-8"))

          new_keys = set(all_keys.keys()) - set(existing_ko.keys())
          print(f"Existing: {len(existing_ko)} | Tolgee: {len(all_keys)} | New: {len(new_keys)}")

          if len(new_keys) == 0:
              print("No new keys, skipping"); exit(0)

          # locales/latest 업데이트
          os.makedirs(LOCALES, exist_ok=True)
          for lang, fname in LANG_FILES.items():
              lang_data = {}
              for key in sorted(all_keys.keys()):
                  val = all_keys[key].get(lang, "")
                  if val:
                      lang_data[key] = val
                  elif lang == "ko":
                      lang_data[key] = existing_ko.get(key, "")
              with open(f"{LOCALES}/{fname}", "w", encoding="utf-8") as f:
                  json.dump(lang_data, f, ensure_ascii=False, indent=2)
              print(f"Updated {LOCALES}/{fname}: {len(lang_data)} keys")

          # 일자별 스냅샷
          snapshot_dir = f"locales/{today}"
          os.makedirs(snapshot_dir, exist_ok=True)
          for lang, fname in LANG_FILES.items():
              src = f"{LOCALES}/{fname}"
              if os.path.exists(src):
                  shutil.copy2(src, f"{snapshot_dir}/{fname}")
          print(f"Snapshot: {snapshot_dir}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add locales/
          if git diff --staged --quiet; then
            echo "No changes"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "sync: Tolgee → locales ($DATE)"
            git push
          fi
