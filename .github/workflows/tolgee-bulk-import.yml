name: Tolgee Bulk Import (File upload)

on:
  workflow_dispatch:
    inputs:
      force_overwrite:
        description: "기존 번역도 덮어쓰기 (OVERRIDE / KEEP)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  bulk-import:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TOLGEE_API_KEY: ${{ secrets.TOLGEE_API_KEY }}
      TOLGEE_URL: https://tolgee.internal.vendit.tech
      TOLGEE_PROJECT_ID: 4
      FORCE_OVERWRITE: ${{ github.event.inputs.force_overwrite }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Bulk import via file upload
        run: |
          python3 << 'PYEOF'
          import json, os, requests, sys

          URL = os.environ['TOLGEE_URL']
          PID = os.environ['TOLGEE_PROJECT_ID']
          API = os.environ['TOLGEE_API_KEY']
          FORCE = os.environ.get('FORCE_OVERWRITE', 'false') == 'true'
          force_mode = 'OVERRIDE' if FORCE else 'KEEP'

          LOCALES = 'locales/latest'
          ALL_LANGS = ['ko', 'en', 'ja', 'zh', 'zh-TW', 'es']

          # Summary
          for lang in ALL_LANGS:
              path = f'{LOCALES}/{lang}.json'
              if os.path.exists(path):
                  data = json.load(open(path, encoding='utf-8'))
                  print(f'{lang}: {len(data)} keys')

          print(f'forceMode: {force_mode}')

          hdrs = {'X-API-Key': API}

          # Upload files one by one (nginx 1MB limit prevents batch upload)
          lang_files = []
          for lang in ALL_LANGS:
              path = f'{LOCALES}/{lang}.json'
              if os.path.exists(path):
                  lang_files.append((lang, path))

          print(f'Uploading {len(lang_files)} files one at a time...')

          # Step 1: Upload each file to the import staging area
          for lang, path in lang_files:
              with open(path, 'rb') as f:
                  resp = requests.post(
                      f'{URL}/v2/projects/{PID}/import',
                      headers=hdrs,
                      files=[('files', (f'{lang}.json', f, 'application/json'))],
                      timeout=60,
                  )
              if resp.status_code in (200, 201):
                  print(f'  {lang}.json uploaded OK')
              else:
                  print(f'  {lang}.json FAILED ({resp.status_code}): {resp.text[:200]}')
                  sys.exit(1)

          # Step 2: Apply the import
          print('Applying import...')
          apply_resp = requests.put(
              f'{URL}/v2/projects/{PID}/import/apply',
              headers={**hdrs, 'Content-Type': 'application/json'},
              params={'forceMode': force_mode},
              timeout=120,
          )
          if apply_resp.status_code == 200:
              print(f'Bulk import complete! All {len(lang_files)} languages applied.')
          else:
              print(f'Apply failed ({apply_resp.status_code}): {apply_resp.text[:500]}')
              sys.exit(1)
          PYEOF
