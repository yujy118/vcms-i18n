name: i18n Fix BLOCK (Retranslate → PR)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '테스트만 (PR 생성 안 함)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-blocks:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
      LOCALES_DIR: locales/latest
      GLOSSARY_PATH: glossary/glossary.json
      PROMPT_PATH: prompts/translate.txt

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run QA to get current BLOCK list
        run: |
          python scripts/qa_check.py \
            --locales locales/latest \
            --glossary glossary/glossary.json \
            --output locales/latest/.qa-report.json || true

      - name: Count BLOCK keys
        id: count
        run: |
          python3 -c "
          import json, os
          qa = json.load(open('locales/latest/.qa-report.json'))
          blocks = [i for i in qa if i.get('severity') == 'BLOCK']
          print(f'BLOCK issues: {len(blocks)}')
          # Unique keys per lang
          by_lang = {}
          for i in blocks:
            lang = i.get('lang','')
            key = i.get('key','')
            if lang and key:
              by_lang.setdefault(lang, set()).add(key)
          total = sum(len(v) for v in by_lang.values())
          print(f'Unique keys to retranslate: {total}')
          for l, keys in by_lang.items():
            print(f'  {l}: {len(keys)}')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'total={total}\n')
          " || echo "total=0" >> "$GITHUB_OUTPUT"

      - name: Retranslate BLOCK keys
        if: ${{ steps.count.outputs.total != '0' }}
        run: |
          python scripts/sync_translations.py \
            --fix-blocks \
            --qa-report locales/latest/.qa-report.json

      - name: Run QA again (verify fixes)
        if: ${{ steps.count.outputs.total != '0' }}
        run: |
          python scripts/qa_check.py \
            --locales locales/latest \
            --glossary glossary/glossary.json \
            --output locales/latest/.qa-report-after.json || true
          echo "=== Before vs After ==="
          python3 -c "
          import json
          before = json.load(open('locales/latest/.qa-report.json'))
          after = json.load(open('locales/latest/.qa-report-after.json'))
          bb = len([i for i in before if i['severity']=='BLOCK'])
          ab = len([i for i in after if i['severity']=='BLOCK'])
          print(f'BLOCK: {bb} -> {ab} ({bb-ab} fixed)')
          "

      - name: Create PR
        id: pr
        if: ${{ steps.count.outputs.total != '0' && inputs.dry_run == false }}
        run: |
          BRANCH="fix/qa-blocks-$(date +%Y%m%d-%H%M)"
          git config user.name "i18n-bot"
          git config user.email "i18n-bot@vcms.dev"
          git checkout -b "$BRANCH"
          git add locales/latest/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "fix(i18n): retranslate QA BLOCK keys"
          git push origin "$BRANCH"

          # Build PR body
          python3 << 'BODYEOF' > /tmp/pr-body.md
          import json, os
          report = {}
          rp = 'locales/latest/.fix-report.json'
          if os.path.exists(rp): report = json.load(open(rp))
          before = json.load(open('locales/latest/.qa-report.json'))
          bb = len([i for i in before if i['severity']=='BLOCK'])
          after_p = 'locales/latest/.qa-report-after.json'
          ab = 0
          if os.path.exists(after_p):
              after = json.load(open(after_p))
              ab = len([i for i in after if i['severity']=='BLOCK'])
          body = f'## QA BLOCK 재번역\n\n'
          body += f'- BLOCK: {bb} → {ab} ({bb-ab} fixed)\n'
          body += f'- Total changed: {report.get("fixed", 0)} keys\n\n'
          body += '### 언어별\n'
          for lang, info in report.get('languages', {}).items():
              body += f'- **{lang}**: {info["changed"]}/{info["keys"]} keys changed\n'
          body += '\n---\n'
          body += '⚠️ **반드시 diff 확인 후 merge 해주세요.**\n'
          body += '특히 HTML 태그(`<bold>`, `<1>` 등)와 플레이스홀더(`{변수}`)가 보존되었는지 확인.'
          print(body)
          BODYEOF

          # Create PR and capture URL
          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -d "$(python3 -c "
          import json
          body = open('/tmp/pr-body.md').read().strip()
          print(json.dumps({
            'title': 'fix(i18n): QA BLOCK 재번역',
            'head': '$BRANCH',
            'base': 'main',
            'body': body,
          }))
          ")")

          PR_URL=$(echo "$PR_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('html_url',''))")
          PR_NUM=$(echo "$PR_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('number',''))")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "PR created: $PR_URL"

      - name: Slack notify
        if: ${{ steps.count.outputs.total != '0' && inputs.dry_run == false }}
        run: |
          python3 << 'SLACKEOF'
          import json, os, urllib.request

          TOKEN = os.environ.get('SLACK_BOT_TOKEN','')
          CHANNEL = os.environ.get('SLACK_CHANNEL','')
          if not TOKEN or not CHANNEL: exit(0)

          PR_URL = "${{ steps.pr.outputs.pr_url }}"
          PR_NUM = "${{ steps.pr.outputs.pr_num }}"
          RUN_URL = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          report = {}
          rp = 'locales/latest/.fix-report.json'
          if os.path.exists(rp): report = json.load(open(rp))

          before = json.load(open('locales/latest/.qa-report.json'))
          bb = len([i for i in before if i['severity']=='BLOCK'])
          after_p = 'locales/latest/.qa-report-after.json'
          ab = 0
          if os.path.exists(after_p):
              after = json.load(open(after_p))
              ab = len([i for i in after if i['severity']=='BLOCK'])

          fixed = report.get('fixed', 0)
          langs_detail = ""
          for lang, info in report.get('languages', {}).items():
              langs_detail += f"  • *{lang}*: {info['changed']}/{info['keys']}건 변경\n"

          blocks = [
              {"type": "header", "text": {"type": "plain_text", "text": "🔧 QA BLOCK 재번역 PR"}},
              {"type": "section", "fields": [
                  {"type": "mrkdwn", "text": f"*BLOCK:* {bb} → {ab} ({bb-ab} fixed)"},
                  {"type": "mrkdwn", "text": f"*변경:* {fixed}건"},
              ]},
              {"type": "section", "text": {"type": "mrkdwn", "text": f"*언어별:*\n{langs_detail}"}},
              {"type": "divider"},
              {"type": "section", "text": {"type": "mrkdwn", "text": "⚠️ *diff 확인 후 merge 해주세요*\nHTML 태그, 플레이스홀더 보존 여부 꼭 확인!"}},
              {"type": "actions", "elements": [
                  {"type": "button", "text": {"type": "plain_text", "text": "📋 PR 리뷰하기"}, "url": PR_URL, "style": "primary"},
                  {"type": "button", "text": {"type": "plain_text", "text": "📜 실행 로그"}, "url": RUN_URL},
              ]},
          ]

          payload = json.dumps({"channel": CHANNEL, "blocks": blocks,
              "text": f"🔧 QA BLOCK 재번역 PR #{PR_NUM}: {fixed}건 수정"}).encode()
          req = urllib.request.Request('https://slack.com/api/chat.postMessage', data=payload,
              headers={'Content-Type':'application/json;charset=utf-8','Authorization':f'Bearer {TOKEN}'})
          resp = urllib.request.urlopen(req, timeout=30)
          d = json.loads(resp.read())
          print("Slack OK" if d.get("ok") else f"Slack err: {d.get('error')}")
          SLACKEOF
